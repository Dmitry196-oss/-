        <h1>БЛОК 3</h1>
        <p>Укажите примерную площадь помещения.</p>
        <div class="box">
        <div class="slider-container">
    <label for="mySlider" class="slider-label">Значение: <span id="sliderValue">50 м²</span></label>
    <input type="range" id="mySlider" min="20" max="300" value="60" step="5" class="slider">
  </div>

  <script>
    const slider = document.getElementById('mySlider');
    const output = document.getElementById('sliderValue');

    // Устанавливаем начальное значение
    output.innerHTML = slider.value + ' м²';

    // Обновляем значение при движении ползунка
    slider.addEventListener('input', function() {
      output.innerHTML = this.value + ' м²';
    });
  </script>
